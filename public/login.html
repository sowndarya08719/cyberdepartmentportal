<!DOCTYPE html>
<html>
<head>

<title>KCE Cyber Portal Login</title>
<link rel="stylesheet" href="style.css">

<!-- Google Sign In -->
<script src="https://accounts.google.com/gsi/client" async defer></script>

</head>

<body>

<div class="login-container">

<h2>Cyber Department Portal</h2>

<!-- EMAIL LOGIN -->

<div class="input-group">
<label>Email</label>
<input type="email" id="email" placeholder="Enter KCE Email">
</div>

<button class="btn" onclick="sendOTP()">Send OTP</button>

<div class="input-group">
<label>OTP</label>
<input type="text" id="otp" placeholder="Enter OTP">
</div>

<button class="btn" onclick="verifyOTP()">Verify OTP</button>


<div class="divider">
<span>OR</span>
</div>


<!-- GOOGLE LOGIN -->

<div id="g_id_onload"
data-client_id="821710004869-tehitlg3qa89as1f7h5ab393gtmso1lh.apps.googleusercontent.com"
data-callback="handleCredentialResponse">
</div>

<div class="g_id_signin"
data-type="standard"
data-size="large"
data-theme="outline"
data-text="sign_in_with"
data-shape="rectangular">
</div>


<div class="signup-link">
<p>Don't have an account?</p>
<a href="signup.html">Sign Up</a>
</div>

</div>


<script>

function validateEmail(email){

const studentPattern=/^7178\d{2}y\d{3}@kce\.ac\.in$/;
const staffPattern=/^[a-zA-Z]+@kce\.ac\.in$/;

return studentPattern.test(email)||staffPattern.test(email);

}


async function sendOTP(){

const email=document.getElementById("email").value;

if(!validateEmail(email)){
alert("Invalid Email ID");
return;
}

const res=await fetch("/send-otp",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({email})
});

const data=await res.json();

alert(data.message);

}


async function verifyOTP(){

const email=document.getElementById("email").value;
const otp=document.getElementById("otp").value;

const res=await fetch("/verify-otp",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({email,otp})
});

const data=await res.json();

if(data.success){

localStorage.setItem("loggedUser",email);
window.location.href="dashboard.html";

}
else{

alert(data.message);

}

}


/* GOOGLE LOGIN */

function handleCredentialResponse(response){

const data=parseJwt(response.credential);

localStorage.setItem("loggedUser",data.email);

window.location.href="dashboard.html";

}


function parseJwt(token){

var base64Url=token.split('.')[1];
var base64=base64Url.replace(/-/g,'+').replace(/_/g,'/');
var jsonPayload=decodeURIComponent(atob(base64).split('').map(function(c){
return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
}).join(''));

return JSON.parse(jsonPayload);

}

</script>

</body>
</html>
